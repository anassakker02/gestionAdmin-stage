name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main  # Branche qui déclenchera le déploiement

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: FirebaseExtended/action-hosting-deploy@v1
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          projectId: "gestionadminastration"  # Ton ID de projet Firebase
          channelId: "live"                  # Pour déployer sur le canal live
